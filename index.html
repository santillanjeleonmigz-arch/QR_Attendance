<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #reader { width: 300px; margin: 20px auto; border: 2px solid #333; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
        input, button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>

    <h2>1. Generate Attendance QR</h2>
    <input type="text" id="qr-text" placeholder="Enter Student Name/ID">
    <button onclick="generateQR()">Create Code</button>
    <div id="qrcode"></div>

    <hr>

    <h2>2. Scan for Attendance</h2>
    <div id="reader"></div>
    <p id="result" style="font-weight: bold; color: green;"></p>

    <script>
        // --- GENERATOR LOGIC ---
        function generateQR() {
            var text = document.getElementById("qr-text").value;
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), text);
        }

        // --- SCANNER LOGIC ---
        function onScanSuccess(decodedText, decodedResult) {
            // When a code is scanned, show the name on the screen
            document.getElementById("result").innerText = "Attendance Marked: " + decodedText;
            
            // Optional: Alert the user
            alert("Check-in successful for: " + decodedText);
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: 250 }
        );
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
