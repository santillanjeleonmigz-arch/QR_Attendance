<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; shadow: 5px; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; min-height: 180px; border: 1px solid #ddd; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h1>Attendance Pro</h1>
    <input type="text" id="userInput" placeholder="Enter Name">
    <button onclick="makeQR()">Create QR Code</button>
    
    <div id="qrcode"></div>
    
    <hr>
    <h3>Scanner</h3>
    <div id="scanner-view"></div>
    <div id="log"></div>
</div>

<script>
    // 1. GENERATE
    function makeQR() {
        var name = document.getElementById("userInput").value;
        var qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = ""; // Clear old one
        
        if(!name) { alert("Type a name!"); return; }

        // This creates the QR
        new QRCode(qrDiv, {
            text: "https://santillanjeleonmigz-arch.github.io/QR_Attendance/?id=" + name,
            width: 180,
            height: 180
        });
    }

    // 2. SCANNER
    function onScanSuccess(text) {
        alert("Scanned: " + text);
        document.getElementById("log").innerHTML += "<div>" + text + "</div>";
    }

    var html5QrcodeScanner = new Html5QrcodeScanner("scanner-view", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html
