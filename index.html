<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #master-qr { margin: 20px auto; display: flex; justify-content: center; padding: 10px; min-height: 200px; align-items: center; border: 2px solid #1a73e8; border-radius: 10px; }
        input { width: 90%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-download { background: #6c757d; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        #status { color: #28a745; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Class Attendance</h1>
    <div id="master-qr">Generating QR...</div>

    <div id="status">✅ Present!</div>
    
    <input type="text" id="studentName" placeholder="Enter Your Full Name">
    <button class="btn-submit" onclick="submitAttendance()">SUBMIT ATTENDANCE</button>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <p style="font-size: 11px; color: #999;">Teacher Section:</p>
    <button class="btn-download" onclick="downloadCSV()">Download Attendance File</button>
</div>

<script>
    let attendanceList = []; // This stores names in the background (private)

    // 1. Generate QR
    function generateQR() {
        const qrBox = document.getElementById("master-qr");
        const url = window.location.origin + window.location.pathname;
        if (typeof QRCode !== "undefined") {
            qrBox.innerHTML = "";
            new QRCode(qrBox, { text: url, width: 200, height: 200 });
        } else { setTimeout(generateQR, 1000); }
    }
    generateQR();

    // 2. Submit (Private)
    function submitAttendance() {
        const nameInput = document.getElementById('studentName');
        const name = nameInput.value.trim();
        if (!name) return alert("Please type your name!");

        const time = new Date().toLocaleTimeString();
        
        // Save to hidden list
        attendanceList.push({ name: name, time: time });

        // Show success but clear name so the next person can't see it
        nameInput.value = "";
        document.getElementById('status').style.display = "block";
        setTimeout(() => { document.getElementById('status').style.display = "none"; }, 3000);
    }

    // 3. Create the File
    function downloadCSV() {
        if (attendanceList.length === 0) return alert("No one has signed in yet!");

        let csvContent = "Name,Time\n";
        attendanceList.forEach(user => {
            csvContent += `${user.name},${user.time}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.location.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'attendance_log.csv');
        a.click();
    }
</script>
</body>
</html>
