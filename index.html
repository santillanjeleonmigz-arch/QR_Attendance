<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .card { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        #master-qr { margin: 20px auto; display: flex; justify-content: center; padding: 10px; background: white; border: 2px solid #1a73e8; border-radius: 10px; width: fit-content; }
        input { width: 90%; padding: 15px; margin: 20px 0 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; }
        #log { margin-top: 30px; text-align: left; background: #eee; padding: 15px; border-radius: 10px; font-size: 14px; }
        .success-msg { color: #28a745; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Class Attendance</h1>
    <p>Scan the code below to sign in</p>
    
    <div id="master-qr"></div>
    <p style="font-size: 12px; color: #666;">Site URL: <span id="site-link"></span></p>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div id="status-msg" class="success-msg">✅ Attendance Recorded!</div>
    
    <input type="text" id="studentName" placeholder="Enter Your Full Name">
    <button onclick="submitAttendance()">Submit Attendance</button>

    <div id="log">
        <strong>Today's Attendance:</strong>
        <div id="list"></div>
    </div>
</div>

<script>
    // 1. AUTO-GENERATE THE MASTER QR CODE
    const currentUrl = window.location.href.split('?')[0]; // Gets your GitHub link
    document.getElementById('site-link').innerText = currentUrl;

    new QRCode(document.getElementById("master-qr"), {
        text: currentUrl,
        width: 200,
        height: 200
    });

    // 2. SUBMIT LOGIC
    function submitAttendance() {
        const name = document.getElementById('studentName').value;
        const list = document.getElementById('list');
        const msg = document.getElementById('status-msg');

        if (!name) {
            alert("Please enter your name!");
            return;
        }

        const time = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.style.padding = "5px 0";
        entry.innerHTML = • <strong>${name}</strong> - ${time};
        
        list.prepend(entry); // Add to the top of the list
        
        // Show success message and clear input
        msg.style.display = "block";
        document.getElementById('studentName').value = "";
        
        setTimeout(() => { msg.style.display = "none"; }, 3000);
    }
</script>

</body>
</html>
