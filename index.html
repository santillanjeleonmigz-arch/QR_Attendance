<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Portal</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #0f172a; /* Deep Midnight Blue */
            color: white;
        }
        /* Glass Card Design */
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 40px 30px; 
            border-radius: 24px; 
            text-align: center; 
            width: 90%; 
            max-width: 380px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 { margin: 0 0 10px; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            background: rgba(255, 255, 255, 0.07); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 12px; 
            color: white; 
            font-size: 16px; 
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: #38bdf8; background: rgba(255, 255, 255, 0.1); }
        
        button { 
            background: #38bdf8; /* Sky Blue */
            color: #0f172a; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: 800; 
            font-size: 16px; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.3s;
        }
        button:active { transform: scale(0.98); }
        
        #status-msg { 
            display: none; 
            margin-top: 20px; 
            padding: 12px; 
            background: rgba(34, 197, 94, 0.2); 
            color: #4ade80; 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: 600; 
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>Class Attendance</h1>
    <p>Sign in with your full name below</p>
    
    <input type="text" id="studentName" placeholder="Full Name" autocomplete="off">
    <button onclick="sendData()">Confirm Attendance</button>
    
    <div id="status-msg">✅ Successfully Recorded!</div>
</div>

<script>
    async function sendData() {
        const input = document.getElementById('studentName');
        const name = input.value.trim();
        const msg = document.getElementById('status-msg');

        if (!name) return alert("Please enter your name!");

        // Your specific Google URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwUzvDtWs0E6ADAoRlBEqPgxxueDDtZvQt4gS4ERJ8X_HAcFCe6HTArRMpdyA3pRZlb/exec';

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: name })
            });
            
            input.value = "";
            msg.style.display = "block";
            setTimeout(() => { msg.style.display = "none"; }, 5000);
        } catch (e) {
            alert("Error: Check internet connection.");
        }
    }
</script>

</body>
</html>
