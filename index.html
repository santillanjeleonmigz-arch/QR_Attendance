<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Attendance System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #master-qr { margin: 20px auto; display: flex; justify-content: center; min-height: 200px; align-items: center; border: 2px solid #1a73e8; border-radius: 10px; }
        input { width: 90%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Teacher's Hidden Section */
        #admin-panel { margin-top: 30px; display: none; text-align: left; background: #fff; border: 2px solid #333; padding: 15px; border-radius: 10px; }
        .btn-lock { background: none; border: none; color: #ccc; font-size: 10px; cursor: pointer; margin-top: 50px; }
        .log-entry { padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Class Attendance</h1>
    <div id="master-qr"></div>
    <p id="status" style="color: #28a745; font-weight: bold; display: none;">✅ Record Submitted!</p>
    
    <input type="text" id="studentName" placeholder="Type Your Full Name">
    <button class="btn-submit" onclick="submitAttendance()">SUBMIT ATTENDANCE</button>
    
    <button class="btn-lock" onclick="unlockAdmin()">Teacher Login</button>
    
    <div id="admin-panel">
        <h3 style="margin-top:0;">Respondents List</h3>
        <div id="log-list"></div>
        <button onclick="downloadCSV()" style="width:100%; padding:10px; background:#1a73e8; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:10px;">Download CSV (Excel)</button>
    </div>
</div>

<script>
    let attendanceData = [];
    const SECRET_PASSWORD = "1234"; // <-- CHANGE YOUR PASSWORD HERE

    // 1. Generate the Master QR
    function generateQR() {
        const url = window.location.origin + window.location.pathname;
        new QRCode(document.getElementById("master-qr"), { text: url, width: 200, height: 200 });
    }
    window.onload = generateQR;

    // 2. Student Submission
    function submitAttendance() {
        const nameInput = document.getElementById('studentName');
        const name = nameInput.value.trim();
        if (!name) return alert("Please type your name!");

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        attendanceData.push({ name: name, time: time });

        // Update the log in the background
        const log = document.getElementById('log-list');
        const entry = document.createElement('div');
        entry.className = "log-entry";
        entry.innerHTML = `<strong>${name}</strong> - ${time}`;
        log.prepend(entry);

        // Clear and show success
        nameInput.value = "";
        document.getElementById('status').style.display = "block";
        setTimeout(() => { document.getElementById('status').style.display = "none"; }, 3000);
    }

    // 3. Unlock Respondents (Accessible only to you)
    function unlockAdmin() {
        const pw = prompt("Enter Teacher Password:");
        if (pw === SECRET_PASSWORD) {
            document.getElementById('admin-panel').style.display = "block";
        } else {
            alert("Wrong password!");
        }
    }

    // 4. Download Attendance File
    function downloadCSV() {
        if (attendanceData.length === 0) return alert("No one has scanned yet!");
        let csv = "Name,Time\n" + attendanceData.map(r => `"${r.name}",${r.time}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.location.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `attendance_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }
</script>

</body>
</html>
