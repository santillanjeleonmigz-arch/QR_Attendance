<script>
    // 1. AUTO-GENERATE THE MASTER QR CODE
    function startSystem() {
        const currentUrl = window.location.origin + window.location.pathname;
        const qrContainer = document.getElementById("master-qr");
        
        // Clear the loading circle
        qrContainer.innerHTML = "";

        new QRCode(qrContainer, {
            text: currentUrl,
            width: 200,
            height: 200,
            correctLevel: QRCode.CorrectLevel.H
        });
        
        console.log("System Ready at: " + currentUrl);
    }

    // Wait 2 seconds after page load to ensure the library is ready
    window.onload = function() {
        setTimeout(startSystem, 2000);
    };

    // 2. SUBMIT LOGIC (Manual input from students)
    function submitAttendance() {
        const nameInput = document.getElementById('studentName');
        const list = document.getElementById('list');
        const name = nameInput.value.trim();

        if (!name) {
            alert("Please enter your name!");
            return;
        }

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const entry = document.createElement('div');
        entry.style.padding = "8px 0";
        entry.style.borderBottom = "1px solid #ddd";
        entry.innerHTML = ✅ <strong>${name}</strong> <span style="float:right; color:gray;">${time}</span>;
        
        list.prepend(entry);
        nameInput.value = ""; // Clear the box for the next person
    }
</script>
