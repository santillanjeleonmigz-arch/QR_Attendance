<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance System</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; margin-bottom: 5px; }
        #reader { width: 100%; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 2px solid #ddd; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; min-height: 180px; align-items: center; background: #fafafa; border: 1px dashed #ccc; border-radius: 10px; }
        input { width: 85%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 92%; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        #log-container { margin-top: 30px; text-align: left; background: #fff; padding: 15px; border-radius: 10px; }
        .log-entry { padding: 8px; border-bottom: 1px solid #eee; color: #333; font-size: 14px; }
        .success-text { color: #28a745; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Attendance Pro</h1>
    <p style="color: #666; font-size: 14px;">Generate or Scan for Attendance</p>
