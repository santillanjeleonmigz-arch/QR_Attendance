<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance</title>
    <style>
        /* Modern Design */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 100%; 
            max-width: 350px; 
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            font-size: 16px; 
            box-sizing: border-box; 
            transition: border-color 0.3s;
        }
        input:focus { border-color: #667eea; outline: none; }
        button { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background: #5a67d8; }
        #status { 
            display: none; 
            margin-top: 20px; 
            padding: 10px; 
            background: #e8f5e9; 
            color: #2e7d32; 
            border-radius: 5px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Class Attendance</h1>
    <p>Please enter your full name to sign in.</p>
    
    <div id="status">✅ Attendance Recorded!</div>
    
    <input type="text" id="studentName" placeholder="Full Name" autocomplete="off">
    <button onclick="submitAttendance()">Submit Attendance</button>
</div>

<script>
    async function submitAttendance() {
        const nameInput = document.getElementById('studentName');
        const name = nameInput.value.trim();
        const status = document.getElementById('status');

        if (!name) return alert("Please enter your name!");

        // Your Google Web App URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwUzvDtWs0E6ADAoRlBEqPgxxueDDtZvQt4gS4ERJ8X_HAcFCe6HTArRMpdyA3pRZlb/exec';

        try {
            // Sending data to Google Sheets
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify({ name: name })
            });
            
            // UI Feedback
            nameInput.value = "";
            status.style.display = "block";
            setTimeout(() => { status.style.display = "none"; }, 5000);
            
        } catch (error) {
            console.error("Error!", error.message);
            alert("Connection error. Please try again.");
        }
    }
</script>

</body>
</html>
